name: Perf

on:
  workflow_dispatch:
  push:
    branches: ['perf/**']

concurrency:
  group: perf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  perf:
    name: Bench + equivalence + oracle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer
          ini-values: memory_limit=2G

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: composer install --no-interaction --prefer-dist
      - run: npm install --prefix bin/.oracle-tools

      - name: Static + unit gates
        run: |
          composer analyse
          composer cs
          php -d memory_limit=512M vendor/bin/phpunit

      - name: Oracle regression (vs Shiki.js)
        run: php bin/test-regression --jobs 4 | tee perf-regression.txt

      - name: Benchmark
        run: composer bench | tee perf-bench.txt

      - name: PCRE fast-path equivalence (must be 0 divergences)
        run: php -d memory_limit=2G bin/.oracle-tools/pcre-equivalence.php 2>&1 | tee perf-equivalence.txt

      - name: Summary
        if: always()
        run: |
          {
            echo '## Perf run'
            echo '### Benchmark'; echo '```'; cat perf-bench.txt 2>/dev/null; echo '```'
            echo '### Equivalence'; echo '```'; tail -8 perf-equivalence.txt 2>/dev/null; echo '```'
            echo '### Oracle'; echo '```'; tail -4 perf-regression.txt 2>/dev/null; echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perf-results
          path: |
            perf-bench.txt
            perf-equivalence.txt
            perf-regression.txt
