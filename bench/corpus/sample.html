<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Benchmark &mdash; Sample Page</title>
    <link rel="stylesheet" href="/assets/main.css" />
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
      }
      .hero {
        padding: 2rem;
        background: #0d1117;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <header class="hero" data-role="banner">
      <h1>Welcome, <span class="accent">visitor</span>!</h1>
      <nav aria-label="Primary">
        <ul>
          <li><a href="#features">Features</a></li>
          <li><a href="#pricing">Pricing</a></li>
          <li><a href="mailto:hi@example.com">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section id="features">
        <h2>Features</h2>
        <p>
          Build <strong>fast</strong> &amp; <em>reliable</em> apps. See the
          <a href="https://example.com/docs" target="_blank" rel="noopener">docs</a>.
        </p>
        <figure>
          <img src="/img/chart.png" alt="Performance chart" width="640" height="320" />
          <figcaption>Throughput over time</figcaption>
        </figure>
      </section>

      <form action="/subscribe" method="post">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required placeholder="you@example.com" />
        <button type="submit">Subscribe</button>
      </form>
    </main>

    <footer>
      <!-- copyright -->
      <small>&copy; 2026 Example Inc.</small>
    </footer>

    <script type="module">
      const form = document.querySelector("form");
      form?.addEventListener("submit", (e) => {
        e.preventDefault();
        console.log("submitted", new FormData(form).get("email"));
      });
    </script>
  </body>
</html>
