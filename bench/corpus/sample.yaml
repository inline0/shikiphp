version: "3.9"

x-defaults: &defaults
  restart: unless-stopped
  networks:
    - backend
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  api:
    <<: *defaults
    image: example/api:2.4.1
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://user:pass@db:5432/app
      - LOG_LEVEL=info
      - FEATURE_FLAGS=experimental,beta
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  db:
    <<: *defaults
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: app

  cache:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    networks: [backend]

networks:
  backend:
    driver: bridge

volumes:
  pgdata: {}

# A multiline description and some scalars
metadata:
  description: >
    This compose file is a benchmark fixture. It includes anchors,
    aliases, flow and block styles, and various scalar types.
  tags:
    - benchmark
    - yaml
    - fixture
  enabled: true
  replicas: 3
  ratio: 1.618
