<VirtualHost *:80>
    ServerName www.example.com
    DocumentRoot "/var/www/html"

    <Directory "/var/www/html">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog "logs/error_log"
    RewriteEngine On
    RewriteRule ^/old/(.*)$ /new/$1 [R=301,L]
</VirtualHost>
