# User and post schema
scalar DateTime

enum Role {
  ADMIN
  USER
}

type User {
  id: ID!
  name: String!
  role: Role = USER
  posts(limit: Int = 10): [Post!]!
}

type Post {
  id: ID!
  title: String!
  createdAt: DateTime
}

query GetUser($id: ID!) {
  user(id: $id) {
    name
    posts(limit: 5) {
      title
    }
  }
}
