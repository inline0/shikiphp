<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Demo &amp; Test</title>
  <style>
    body { font-family: sans-serif; margin: 0; }
    .hero { color: #2188ff; padding: 1rem; }
  </style>
</head>
<body>
  <main class="hero" data-role="main">

    document.querySelector("h1").textContent = greet("there");

</html>
