; Application configuration
[server]
host = 0.0.0.0
port = 8080
debug = false

[database]
url = postgres://user:pass@localhost:5432/app
pool_size = 20
timeout = 30  # seconds

[logging]
level = INFO
file = /var/log/app.log
format = "%(asctime)s %(levelname)s %(message)s"

[features]
enable_cache = true
allowed_hosts = localhost, 127.0.0.1, example.com
