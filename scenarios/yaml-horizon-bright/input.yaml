version: "3.8"
services:
  web:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      - NODE_ENV=production
    volumes:
      - ./html:/usr/share/nginx/html:ro
    depends_on: [db]
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: &pw secret
      POSTGRES_USER: admin
anchors:
  password: *pw
